services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://soundverse:soundverse@db:5432/soundverse
      - API_KEY=dev-api-key-123
      - DEBUG=true
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - soundverse-net

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=soundverse
      - POSTGRES_PASSWORD=soundverse
      - POSTGRES_DB=soundverse
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U soundverse"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - soundverse-net

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    depends_on:
      - app
    networks:
      - soundverse-net

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards/dashboard.yml:/etc/grafana/provisioning/dashboards/dashboard.yml:ro
      - ./monitoring/grafana/provisioning/dashboards/soundverse.json:/var/lib/grafana/dashboards/soundverse.json:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - soundverse-net

volumes:
  pgdata:
  prometheus_data:
  grafana_data:

networks:
  soundverse-net:
    driver: bridge
