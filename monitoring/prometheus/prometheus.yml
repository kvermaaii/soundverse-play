global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: "soundverse-play-api"
    metrics_path: /metrics
    static_configs:
      - targets: ["app:8000"]
        labels:
          environment: "local"
          service: "play-api"

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
