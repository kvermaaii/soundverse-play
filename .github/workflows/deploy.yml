name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render Deploy Hook
        if: secrets.RENDER_DEPLOY_HOOK_URL != ''
        run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
